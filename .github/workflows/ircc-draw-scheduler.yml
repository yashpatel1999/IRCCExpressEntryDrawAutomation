name: IRCC Draw Scheduler

on:
  schedule:
    - cron: "*/30 * * * 1-5"
  workflow_dispatch:
    inputs:
      delay_seconds:
        description: "Delay before running the check"
        required: false
        default: "30"
      force_notify:
        description: "Send notifications even if draw/pool state is unchanged (manual testing only)"
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  check-draw:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check Toronto business-hours window
        id: schedule_window
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "run_reason=manual_dispatch" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          toronto_day=$(TZ=America/Toronto date +%u)
          toronto_hour=$(TZ=America/Toronto date +%H)
          toronto_timestamp=$(TZ=America/Toronto date '+%Y-%m-%d %H:%M:%S %Z')

          echo "Toronto time: $toronto_timestamp"

          if [ "$toronto_day" -ge 1 ] && [ "$toronto_day" -le 5 ] && [ "$toronto_hour" -ge 9 ] && [ "$toronto_hour" -lt 18 ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "run_reason=weekday_business_hours" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "run_reason=outside_business_hours" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.schedule_window.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        if: steps.schedule_window.outputs.should_run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Python dependencies
        if: steps.schedule_window.outputs.should_run == 'true'
        run: pip install -r requirements.txt

      - name: Install Node dependencies
        if: steps.schedule_window.outputs.should_run == 'true'
        run: npm ci

      - name: Install Playwright browser
        if: steps.schedule_window.outputs.should_run == 'true'
        run: npx playwright install --with-deps chromium

      - name: Fetch scheduler state branch
        if: steps.schedule_window.outputs.should_run == 'true'
        run: git fetch origin scheduler-state:scheduler-state || true

      - name: Restore scheduler state if it exists
        if: steps.schedule_window.outputs.should_run == 'true'
        run: |
          mkdir -p state
          if git show scheduler-state:state/ircc_draw_state.json > state/ircc_draw_state.json.tmp 2>/dev/null; then
            mv state/ircc_draw_state.json.tmp state/ircc_draw_state.json
            echo "Restored state from scheduler-state branch"
          else
            rm -f state/ircc_draw_state.json.tmp state/ircc_draw_state.json
            echo "No previous scheduler state found"
          fi

      - name: Run scheduler
        if: steps.schedule_window.outputs.should_run == 'true'
        id: run_scheduler
        continue-on-error: true
        env:
          PYTHONPATH: src
          IRCC_STATE_FILE: state/ircc_draw_state.json
          IRCC_LOG_FILE: state/ircc_draw.log.jsonl
          NTFY_SERVER_URL: ${{ secrets.NTFY_SERVER_URL }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NTFY_TITLE: ${{ secrets.NTFY_TITLE }}
          NTFY_DRAW_TITLE: ${{ secrets.NTFY_DRAW_TITLE }}
          NTFY_POOL_TITLE: ${{ secrets.NTFY_POOL_TITLE }}
          NTFY_USERNAME: ${{ secrets.NTFY_USERNAME }}
          NTFY_PASSWORD: ${{ secrets.NTFY_PASSWORD }}
          NTFY_TOKEN: ${{ secrets.NTFY_TOKEN }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          log_file = Path("state/ircc_draw.log.jsonl")
          log_file.parent.mkdir(parents=True, exist_ok=True)
          payload = {
              "event": "workflow_scheduler_step_started",
              "step": "run_scheduler",
              "commit_sha": os.environ.get("GITHUB_SHA"),
              "workflow_run_id": os.environ.get("GITHUB_RUN_ID"),
              "workflow_run_attempt": os.environ.get("GITHUB_RUN_ATTEMPT"),
          }
          with log_file.open("a", encoding="utf-8") as handle:
              handle.write(json.dumps(payload, sort_keys=True) + "\n")
          PY
          if [ -n "${{ github.event.inputs.delay_seconds }}" ] && [ "${{ github.event.inputs.delay_seconds }}" != "0" ]; then
            sleep "${{ github.event.inputs.delay_seconds }}"
          fi
          set +e
          FORCE_NOTIFY_ARGS=""
          if [ "${{ github.event.inputs.force_notify }}" = "true" ]; then
            FORCE_NOTIFY_ARGS="--force-notify"
          fi
          python -m ircc_draw_automation.main check_latest_draw $FORCE_NOTIFY_ARGS
          scheduler_exit_code=$?
          set -e
          export SCHEDULER_EXIT_CODE="$scheduler_exit_code"
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          log_file = Path("state/ircc_draw.log.jsonl")
          log_file.parent.mkdir(parents=True, exist_ok=True)
          payload = {
              "event": "workflow_scheduler_step_finished",
              "step": "run_scheduler",
              "exit_code": int(os.environ.get("SCHEDULER_EXIT_CODE", "0")),
              "commit_sha": os.environ.get("GITHUB_SHA"),
              "workflow_run_id": os.environ.get("GITHUB_RUN_ID"),
              "workflow_run_attempt": os.environ.get("GITHUB_RUN_ATTEMPT"),
          }
          with log_file.open("a", encoding="utf-8") as handle:
              handle.write(json.dumps(payload, sort_keys=True) + "\n")
          PY
          exit $scheduler_exit_code

      - name: Record workflow outcome
        if: always()
        env:
          IRCC_LOG_FILE: state/ircc_draw.log.jsonl
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
          RUN_OUTCOME: ${{ steps.run_scheduler.outcome }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          log_file = Path(os.environ["IRCC_LOG_FILE"])
          log_file.parent.mkdir(parents=True, exist_ok=True)
          payload = {
              "event": "workflow_run_outcome",
              "run_outcome": os.environ.get("RUN_OUTCOME", "unknown"),
              "run_reason": "${{ steps.schedule_window.outputs.run_reason }}",
              "commit_sha": os.environ.get("GITHUB_SHA"),
              "workflow_run_id": os.environ.get("GITHUB_RUN_ID"),
              "workflow_run_attempt": os.environ.get("GITHUB_RUN_ATTEMPT"),
          }
          with log_file.open("a", encoding="utf-8") as handle:
              handle.write(json.dumps(payload, sort_keys=True) + "\n")
          PY

      - name: Publish updated state branch
        if: always() && steps.schedule_window.outputs.should_run == 'true'
        run: |
          if [ -f state/ircc_draw_state.json ] || [ -f state/ircc_draw.log.jsonl ] || [ -f state/latest_run_summary.json ] || [ -f state/run_history.jsonl ]; then
            git checkout -B scheduler-state
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -f state/ircc_draw_state.json
            if [ -f state/ircc_draw.log.jsonl ]; then
              git add -f state/ircc_draw.log.jsonl
            fi
            if [ -f state/latest_run_summary.json ]; then
              git add -f state/latest_run_summary.json
            fi
            if [ -f state/run_history.jsonl ]; then
              git add -f state/run_history.jsonl
            fi
            if git diff --cached --quiet; then
              echo "No state changes to publish"
            else
              git commit -m "Update scheduler state"
              git push --force origin scheduler-state
            fi
          fi

      - name: Upload scheduler logs
        if: always() && steps.schedule_window.outputs.should_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ircc-scheduler-state
          path: |
            state/ircc_draw_state.json
            state/ircc_draw.log.jsonl
            state/latest_run_summary.json
            state/run_history.jsonl

      - name: Fail workflow if scheduler failed
        if: steps.schedule_window.outputs.should_run == 'true' && steps.run_scheduler.outcome == 'failure'
        run: exit 1
